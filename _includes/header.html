<header class="site-header">
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="site-nav__logo">estelzer<span>.</span></a>
    <div class="site-nav__links">
      <a href="{{ '/categorias/tecnologia' | relative_url }}" {% if page.categories[0] == 'tecnologia' %}class="active"{% endif %}>💻 Tecnologia</a>
      <a href="{{ '/categorias/literatura-artes' | relative_url }}" {% if page.categories[0] == 'literatura-artes' %}class="active"{% endif %}>🎨 Literatura &amp; Artes</a>
      <a href="{{ '/sobre' | relative_url }}" {% if page.url contains 'sobre' %}class="active"{% endif %}>Sobre</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema" title="Alternar tema claro/escuro">🌙</button>
    </div>
  </nav>
</header>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  var btn = document.getElementById('themeToggle');
  if(btn) btn.textContent = t === 'dark' ? '🌙' : '☀️';
  document.addEventListener('DOMContentLoaded', function(){
    var b = document.getElementById('themeToggle');
    if(!b) return;
    b.textContent = (localStorage.getItem('theme')||'dark') === 'dark' ? '🌙' : '☀️';
    b.addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      b.textContent = next === 'dark' ? '🌙' : '☀️';
    });
  });
})();
</script>
